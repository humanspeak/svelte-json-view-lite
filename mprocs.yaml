procs:
    urls:
        shell: node --no-warnings scripts/dev-urls.mjs
        autostart: true
        autorestart: false
    playground:
        shell: pnpm dev
    package:
        shell: pnpm dev:pkg
    test:
        shell: pnpm test:watch
